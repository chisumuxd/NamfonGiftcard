<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Namfon Gift card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Tahoma,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at 8% 12%, rgba(255,255,255,.85) 0 .7rem, transparent .75rem),
    radial-gradient(circle at 82% 10%, rgba(255,255,255,.65) 0 1rem, transparent 1.08rem),
    linear-gradient(135deg,#fff8c2 0%,#ffe884 30%,#ffd84d 62%,#ffc928 100%);
}

.card{
    width:90%;
    max-width:450px;
    background:#fffef8;
    border-radius:28px;
    padding:30px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
}

h1{
    color:#7a4f00;
    margin-bottom:10px;
}

p{
    color:#8a6a18;
    margin-bottom:20px;
}

.loader{
    width:50px;
    height:50px;
    margin:20px auto;
    border:5px solid #ffe58a;
    border-top:5px solid #facc15;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

button{
    border:none;
    background:#facc15;
    color:#6b4f00;
    padding:12px 20px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
    <h1>🐥 Duck Gift Card Center</h1>

    <p>กำลังเปิดระบบ...</p>

    <div class="loader"></div>

    <button onclick="openSystem()">
        เปิดระบบ
    </button>
</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbx0i_bHluG8wu4wZuzexoxrsoNLFl6C0um01xWko-31rnh2MiRIlsg7uQOFTnQvPrr8/exec";

function openSystem(){
    window.location.href = WEB_APP_URL;
}

setTimeout(()=>{
    window.location.href = WEB_APP_URL;
},1500);

</script>

</body>
</html>
