<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Namfon Gift card</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Tahoma,sans-serif;
}

:root{
    --main-red:#ff4d6d;
    --soft-red:#ff8fa3;
    --light-red:#ffd6dc;
    --pale-red:#fff1f3;
    --card-bg:#fffafa;
    --text-red:#7a1f2b;
    --muted-red:#9f5a66;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at 8% 12%, rgba(255,255,255,.85) 0 .7rem, transparent .75rem),
    radial-gradient(circle at 82% 10%, rgba(255,255,255,.65) 0 1rem, transparent 1.08rem),
    linear-gradient(135deg,
        #fff7f8 0%,
        var(--pale-red) 30%,
        var(--light-red) 62%,
        var(--soft-red) 100%
    );
}

.card{
    width:90%;
    max-width:450px;
    background:var(--card-bg);
    border-radius:28px;
    padding:30px;
    text-align:center;
    box-shadow:0 20px 50px rgba(122,31,43,.18);
    border:1px solid rgba(255,77,109,.18);
}

h1{
    color:var(--text-red);
    margin-bottom:10px;
}

p{
    color:var(--muted-red);
    margin-bottom:20px;
}

.loader{
    width:50px;
    height:50px;
    margin:20px auto;
    border:5px solid var(--light-red);
    border-top:5px solid var(--main-red);
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

button{
    border:none;
    background:var(--pale-red);
    color:var(--text-red);
    padding:12px 20px;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 8px 18px rgba(255,77,109,.18);
}

button:hover{
    background:var(--light-red);
}
</style>
</head>

<body>

<div class="card">
    <h1>🐥 Duck Gift Card Center</h1>

    <p>กำลังเปิดระบบ...</p>

    <div class="loader"></div>

    <button onclick="openSystem()">
        เปิดระบบ
    </button>
</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbx0i_bHluG8wu4wZuzexoxrsoNLFl6C0um01xWko-31rnh2MiRIlsg7uQOFTnQvPrr8/exec";

function openSystem(){
    window.location.href = WEB_APP_URL;
}

setTimeout(()=>{
    window.location.href = WEB_APP_URL;
},1500);

</script>

</body>
</html>
